<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>yura.ai — Yura Kriachko</title>
  <meta name="description" content="I build autonomous AI. Founder of Dremian.">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%2306080d'/%3E%3Ccircle cx='50' cy='50' r='6' fill='%23ff6b4a'/%3E%3C/svg%3E">
  <style>
    :root {
      --bg: #06080d;
      --fg: #f4f6fa;
      --muted: rgba(244, 246, 250, 0.55);
      --faint: rgba(244, 246, 250, 0.32);
      --accent: #ff6b4a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, system-ui, sans-serif;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 25% 30%, rgba(50, 80, 130, 0.18), transparent 60%),
        radial-gradient(ellipse at 75% 80%, rgba(110, 40, 60, 0.10), transparent 55%);
      pointer-events: none;
      z-index: 1;
    }

    canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    main {
      position: relative;
      z-index: 2;
      width: 100%;
      height: 100vh;
      padding: 6vh 7vw;
      display: grid;
      grid-template-rows: 1fr auto;
      pointer-events: none;
    }

    main a, main button { pointer-events: auto; }

    .hero { align-self: center; max-width: 780px; }

    h1 {
      font-size: clamp(64px, 11vw, 168px);
      font-weight: 500;
      letter-spacing: -0.045em;
      line-height: 0.95;
      mix-blend-mode: screen;
    }

    h1 .dot { color: var(--accent); }

    .tagline {
      margin-top: 28px;
      font-size: clamp(18px, 1.6vw, 22px);
      color: var(--muted);
      letter-spacing: -0.01em;
    }

    .footer-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 32px;
      flex-wrap: wrap;
    }

    .meta {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.5;
      max-width: 48ch;
    }

    .meta a {
      color: var(--fg);
      text-decoration: none;
      border-bottom: 1px solid rgba(244, 246, 250, 0.25);
      transition: border-color 0.2s ease;
    }

    .meta a:hover { border-color: var(--accent); }

    .creds {
      margin-top: 8px;
      font-size: 12px;
      color: var(--faint);
      line-height: 1.55;
      max-width: 60ch;
      font-family: ui-monospace, "SF Mono", Menlo, "JetBrains Mono", monospace;
      letter-spacing: 0.005em;
    }

    nav.links {
      display: flex;
      gap: 24px;
      font-size: 13px;
      letter-spacing: -0.005em;
    }

    nav.links a {
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s ease;
    }

    nav.links a:hover { color: var(--fg); }

    .counter {
      position: fixed;
      top: 24px;
      right: 28px;
      font-family: ui-monospace, "SF Mono", Menlo, "JetBrains Mono", monospace;
      font-size: 11px;
      letter-spacing: 0.04em;
      color: var(--faint);
      z-index: 3;
      text-transform: lowercase;
      user-select: none;
      text-align: right;
      line-height: 1.7;
    }

    .counter span { color: var(--muted); }

    .annotation {
      position: fixed;
      z-index: 3;
      pointer-events: none;
      font-family: ui-monospace, "SF Mono", Menlo, "JetBrains Mono", monospace;
      font-size: 11px;
      letter-spacing: 0.04em;
      line-height: 1.55;
      text-transform: lowercase;
      user-select: none;
      white-space: nowrap;
      transform: translateY(-50%);
      opacity: 0;
      transition:
        left 0.8s cubic-bezier(0.65, 0, 0.35, 1),
        top 0.8s cubic-bezier(0.65, 0, 0.35, 1),
        opacity 0.5s ease;
    }

    .annotation.visible { opacity: 1; }

    .annotation::before {
      content: "";
      position: absolute;
      left: -32px;
      top: 50%;
      width: 24px;
      height: 1px;
      background: rgba(255, 107, 74, 0.45);
    }

    .annotation .ann-title { color: var(--muted); }
    .annotation .ann-sub {
      color: var(--faint);
      font-size: 10px;
      margin-top: 2px;
    }

    .annotation.left {
      transform: translate(-100%, -50%);
      text-align: right;
    }
    .annotation.left::before {
      left: auto;
      right: -32px;
    }

    @media (max-width: 640px) {
      main { padding: 5vh 6vw; }
      .footer-row { flex-direction: column; align-items: flex-start; gap: 18px; }
      .counter { top: 16px; right: 16px; font-size: 10px; }
      .annotation {
        font-size: 10px;
        white-space: normal;
        max-width: 140px;
      }
      .annotation::before { left: -20px; width: 14px; }
      .annotation.left::before { right: -20px; }
    }

    @media (prefers-reduced-motion: reduce) {
      canvas { opacity: 0.4; }
    }
  </style>
</head>
<body>

  <script>
    (() => {
      const canvas = document.getElementById('bg');
      const ctx = canvas.getContext('2d');
      const genEl = document.getElementById('gen');
      const bestEl = document.getElementById('best');
      const annotationEl = document.getElementById('annotation');

      let W, H, DPR;

      function resize() {
        DPR = Math.min(window.devicePixelRatio || 1, 2);
        W = window.innerWidth;
        H = window.innerHeight;
        canvas.width = W * DPR;
        canvas.height = H * DPR;
        canvas.style.width = W + 'px';
        canvas.style.height = H + 'px';
        ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
      }
      window.addEventListener('resize', () => { resize(); moveAnnotation(); });
      resize();

      function moveAnnotation() {
        if (!target) return;
        const labelW = W < 640 ? 140 : 220;
        let left;
        if (target.x + 40 + labelW < W - 16) {
          left = target.x + 40;
          annotationEl.classList.remove('left');
        } else {
          left = target.x - 40;
          annotationEl.classList.add('left');
        }
        annotationEl.style.left = left + 'px';
        annotationEl.style.top = target.y + 'px';
        annotationEl.classList.add('visible');
      }

      const GRAVITY = 0.06;
      const THRUST_MAX = 0.085;
      const ARM = 14;
      const TORQUE_SCALE = 0.012;
      const VEL_DAMP = 0.997;
      const ANG_DAMP = 0.97;
      const MAX_V = 6;
      const MAX_OMEGA = 0.4;

      const IN = 7, HID = 8, OUT = 2;
      const NUM_W = IN * HID + HID + HID * OUT + OUT;

      // 6 pre-trained champions from offline GA run (1200 gens, robust eval)
      const PRETRAINED = [[-0.8455,6.3833,0.7302,4.2382,0.8883,-0.7687,-3.3302,0.0824,5.7952,1.4158,-1.1612,-0.251,3.0615,0.2453,-2.4908,-0.4118,-2.4085,0.4744,-1.6566,0.2518,0.1896,0.4536,-1.6077,-0.6813,0.5619,-0.9534,-1.5781,2.4533,-0.5074,-0.301,-1.8116,2.9069,-1.8679,-7.5699,1.0629,-6.6342,-0.7221,-0.3174,2.6584,-0.4579,-1.4143,0.9027,-1.8976,-1.9966,-1.488,0.0306,-4.6553,0.0334,1.7342,-5.3008,-0.2505,-1.7193,-0.0381,-0.919,0.7691,1.0814,3.8646,-0.1621,0.0767,-2.8403,3.8002,1.8714,0.1193,1.219,-0.3229,-4.1049,5.6191,0.7147,-1.112,3.3816,-0.9775,0.499,-1.5763,1.0849,0.684,-1.421,0.0154,-1.2324,-1.1937,-3.4632,0.3358,0.1206],[-0.9675,6.4613,0.409,4.8305,0.5003,-1.7102,-2.691,-0.2908,4.9817,1.4345,-0.7539,-0.9345,2.5229,0.367,-2.2063,-0.8108,-3.1028,0.1422,-1.846,0.666,0.5728,0.3758,-2.1823,-0.6589,0.3816,-1.3119,-1.98,2.7727,-0.1589,-0.0933,-2.9869,3.1575,-0.9962,-7.2659,1.0863,-6.384,-1.1483,0.0518,2.2716,-0.6022,-1.8774,1.4052,-1.8404,-1.4127,-1.4981,0.0306,-4.6553,0.0334,1.8715,-5.3008,-0.2505,-1.7193,0.2266,-0.919,0.6946,1.0814,3.8646,-0.1621,0.4572,-2.8403,3.5196,1.8714,0.1193,1.219,-0.3229,-4.1049,5.6424,0.6181,-0.6527,3.3358,-0.9775,0.499,-1.9413,1.0849,0.7663,-1.421,0.0154,-1.0199,-1.0388,-3.4632,0.7718,0.0563],[-0.8367,6.1304,0.8084,4.3883,0.8891,-0.732,-3.4806,-0.3084,4.9749,1.4345,-0.5082,-0.2075,2.7748,-0.0044,-2.8516,-0.9464,-3.475,0.4744,-1.846,0.8267,0.5728,0.3758,-1.8829,-0.6589,0.673,-1.3119,-1.98,2.8917,-0.5014,-0.5329,-2.9869,3.1575,-0.5286,-7.0208,1.0863,-6.6453,-1.1483,0.2462,2.4751,-0.3797,-1.4697,1.203,-2.6467,-1.1014,-1.761,-0.3505,-4.5136,-0.0931,2.1041,-5.5967,-0.3284,-1.0304,-0.5541,-0.6173,0.1725,0.7491,3.7203,0.3492,0.6538,-2.8403,4.3721,2.135,-0.1564,2.3386,-0.7272,-4.0122,5.391,1.4152,-1.1028,3.3495,-1.1187,0.2844,-1.5763,0.8292,0.0977,-0.892,-0.0199,-2.2478,-0.227,-2.7116,-0.2839,0.1206],[-1.053,7.4682,2.1607,4.2514,0.5813,-0.8032,-2.0909,-1.0746,5.1433,1.4345,-0.5082,-0.7748,3.0534,0.0727,-2.5795,-0.0512,-3.4735,-0.2652,-1.4737,0.0529,0.7065,0.6337,-1.3442,-0.5156,0.8861,-1.6817,-1.98,2.4744,-0.1589,-0.3969,-2.9869,3.3964,-1.131,-7.0208,1.0863,-6.2673,-1.1483,0.0518,2.59,-0.6269,-1.5602,1.203,-2.6467,-1.5474,-1.7612,-0.3505,-4.5136,-0.0931,2.1041,-5.5967,-0.7283,-1.295,-0.3456,-0.7714,0.1725,0.6281,3.4235,0.5375,0.6462,-3.3259,3.6201,2.6779,-0.4348,1.86,-0.6304,-4.3657,5.4243,0.4765,-1.1794,3.0384,-0.5163,0.5238,-1.5742,1.9185,-1.02,-1.3371,0.0154,-1.6138,-1.273,-3.2402,0.3358,-0.4161],[-0.6936,6.3431,0.8084,4.1398,1.1601,-0.732,-3.1015,-0.1297,5.1433,1.3886,-0.5082,-0.2075,2.4845,0.23,-2.6052,-0.4667,-3.4892,0.6128,-1.5807,0.3474,0.4616,0.2976,-0.9591,-0.5156,0.8861,-1.6817,-1.3354,2.4456,-0.5074,-0.482,-2.416,2.8322,-1.6836,-7.6298,0.9703,-6.327,-1.4865,0.1019,3.0162,-0.6022,-1.9267,1.1514,-1.506,-1.9966,-1.488,0.0306,-4.6553,0.0334,1.7342,-5.3008,-0.2505,-1.7193,-0.0381,-0.919,0.7691,1.0814,3.8646,-0.1621,0.0767,-2.8403,3.8002,1.8714,0.1193,1.5478,-0.3229,-4.1049,5.6191,0.5063,-1.112,3.3816,-0.9775,0.499,-1.5763,1.0849,0.3845,-1.7559,0.0154,-1.5287,-1.273,-3.2402,0.17,0.3225],[-0.6579,6.3431,0.8084,4.075,0.4927,-0.732,-3.1015,-0.3084,5.1433,1.4345,-0.5082,-0.2075,2.4845,0.23,-2.7071,-0.4667,-3.4892,0.6128,-1.5807,0.0529,0.7065,0.2976,-1.3442,-0.5156,0.8861,-1.6817,-1.98,2.7922,-0.1589,-0.3969,-2.9869,3.3836,-1.131,-7.0208,1.0863,-6.4375,-1.1483,0.0518,2.59,-0.6269,-1.5602,1.203,-2.6467,-1.3719,-1.7612,-0.3505,-4.5136,-0.0931,2.1041,-5.5967,-0.7283,-1.295,-0.3456,-0.7714,0.1725,0.7886,3.4235,0.5375,0.6538,-3.3259,3.6201,2.6779,-0.4348,1.86,-0.6304,-4.3657,5.4243,0.4765,-1.1794,3.0384,-0.5163,0.5238,-1.5742,1.9185,-1.02,-1.3371,0.0154,-1.6138,-1.273,-3.2402,0.3358,-0.4161]];

      function seedWeights(i) {
        const w = new Float32Array(PRETRAINED[i % PRETRAINED.length]);
        if (i >= 4) {
          for (let j = 0; j < NUM_W; j++) {
            if (Math.random() < 0.20) w[j] += (Math.random() * 2 - 1) * 0.30;
          }
        }
        return w;
      }

      function forward(w, inputs) {
        const hidden = new Float32Array(HID);
        let idx = 0;
        for (let j = 0; j < HID; j++) {
          let s = 0;
          for (let i = 0; i < IN; i++) s += inputs[i] * w[idx++];
          s += w[idx++];
          hidden[j] = Math.tanh(s);
        }
        const out = new Float32Array(OUT);
        for (let k = 0; k < OUT; k++) {
          let s = 0;
          for (let j = 0; j < HID; j++) s += hidden[j] * w[idx++];
          s += w[idx++];
          out[k] = Math.tanh(s);
        }
        return out;
      }

      class Drone {
        constructor(weights) { this.w = weights; this.reset(); }
        reset() {
          this.x = W * (0.35 + Math.random() * 0.3);
          this.y = H * (0.35 + Math.random() * 0.25);
          this.vx = (Math.random() - 0.5) * 1.2;
          this.vy = (Math.random() - 0.5) * 1.2;
          this.theta = (Math.random() - 0.5) * 0.5;
          this.omega = (Math.random() - 0.5) * 0.06;
          this.alive = true;
          this.fitness = 0;
          this.trail = [];
          this.lastL = 0;
          this.lastR = 0;
        }
        step(target) {
          if (!this.alive) return;

          const inputs = [
            (this.x - target.x) / W,
            (this.y - target.y) / H,
            this.vx / MAX_V,
            this.vy / MAX_V,
            Math.sin(this.theta),
            Math.cos(this.theta),
            this.omega / MAX_OMEGA
          ];
          const out = forward(this.w, inputs);
          const left = (out[0] + 1) * 0.5;
          const right = (out[1] + 1) * 0.5;
          this.lastL = left;
          this.lastR = right;

          const upX = Math.sin(this.theta);
          const upY = -Math.cos(this.theta);
          const totalT = (left + right) * THRUST_MAX;
          this.vx = (this.vx + upX * totalT) * VEL_DAMP;
          this.vy = (this.vy + upY * totalT + GRAVITY) * VEL_DAMP;

          this.omega = (this.omega + (left - right) * TORQUE_SCALE) * ANG_DAMP;

          const sp = Math.hypot(this.vx, this.vy);
          if (sp > MAX_V) { this.vx *= MAX_V / sp; this.vy *= MAX_V / sp; }
          if (this.omega > MAX_OMEGA) this.omega = MAX_OMEGA;
          else if (this.omega < -MAX_OMEGA) this.omega = -MAX_OMEGA;

          this.x += this.vx;
          this.y += this.vy;
          this.theta += this.omega;

          if (this.x < -40 || this.x > W + 40 || this.y < -80 || this.y > H + 40) {
            this.alive = false;
            return;
          }
          if (Math.abs(this.theta) > Math.PI * 1.2) {
            this.alive = false;
            return;
          }

          const d = Math.hypot(this.x - target.x, this.y - target.y);
          this.fitness += 0.6 / (1 + d * 0.012)
                        + 0.2 / (1 + sp * 0.6)
                        + 0.2 * Math.max(0, Math.cos(this.theta));

          this.trail.push(this.x, this.y);
          if (this.trail.length > 40) this.trail.splice(0, 2);
        }
        draw() {
          if (this.trail.length >= 4) {
            ctx.lineWidth = 1;
            for (let i = 2; i < this.trail.length; i += 2) {
              const t = i / this.trail.length;
              ctx.strokeStyle = `rgba(220, 230, 250, ${t * 0.18})`;
              ctx.beginPath();
              ctx.moveTo(this.trail[i - 2], this.trail[i - 1]);
              ctx.lineTo(this.trail[i], this.trail[i + 1]);
              ctx.stroke();
            }
          }
          if (!this.alive) return;

          const c = Math.cos(this.theta), s = Math.sin(this.theta);
          const lx = this.x - c * ARM, ly = this.y - s * ARM;
          const rx = this.x + c * ARM, ry = this.y + s * ARM;

          // body-frame down vector
          const dnX = -s, dnY = c;

          // exhaust plumes
          ctx.lineCap = 'round';
          if (this.lastL > 0.04) {
            ctx.strokeStyle = `rgba(255, 130, 80, ${this.lastL * 0.65})`;
            ctx.lineWidth = 2.2;
            ctx.beginPath();
            ctx.moveTo(lx, ly);
            ctx.lineTo(lx + dnX * this.lastL * 18, ly + dnY * this.lastL * 18);
            ctx.stroke();
          }
          if (this.lastR > 0.04) {
            ctx.strokeStyle = `rgba(255, 130, 80, ${this.lastR * 0.65})`;
            ctx.lineWidth = 2.2;
            ctx.beginPath();
            ctx.moveTo(rx, ry);
            ctx.lineTo(rx + dnX * this.lastR * 18, ry + dnY * this.lastR * 18);
            ctx.stroke();
          }
          ctx.lineCap = 'butt';

          // arm bar
          ctx.strokeStyle = 'rgba(244, 246, 250, 0.5)';
          ctx.lineWidth = 1.6;
          ctx.beginPath();
          ctx.moveTo(lx, ly);
          ctx.lineTo(rx, ry);
          ctx.stroke();

          // rotor discs (hollow rings — read as spinning rotors)
          ctx.strokeStyle = 'rgba(244, 246, 250, 0.9)';
          ctx.lineWidth = 1.2;
          ctx.beginPath();
          ctx.arc(lx, ly, 3.5, 0, Math.PI * 2);
          ctx.moveTo(rx + 3.5, ry);
          ctx.arc(rx, ry, 3.5, 0, Math.PI * 2);
          ctx.stroke();

          // motor mounts
          ctx.fillStyle = 'rgba(244, 246, 250, 0.7)';
          ctx.beginPath();
          ctx.arc(lx, ly, 1, 0, Math.PI * 2);
          ctx.moveTo(rx + 1, ry);
          ctx.arc(rx, ry, 1, 0, Math.PI * 2);
          ctx.fill();

          // fuselage (central body)
          ctx.fillStyle = 'rgba(244, 246, 250, 0.55)';
          ctx.beginPath();
          ctx.arc(this.x, this.y, 1.9, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      const POP_SIZE = 60;
      const ELITE = 4;
      const MUT_RATE = 0.10;
      const MUT_SCALE = 0.4;

      let drones = [];
      for (let i = 0; i < POP_SIZE; i++) drones.push(new Drone(seedWeights(i)));

      function tournament() {
        let best = drones[Math.floor(Math.random() * POP_SIZE)];
        for (let i = 0; i < 3; i++) {
          const c = drones[Math.floor(Math.random() * POP_SIZE)];
          if (c.fitness > best.fitness) best = c;
        }
        return best;
      }

      function crossover(a, b) {
        const c = new Float32Array(NUM_W);
        const cut = Math.floor(Math.random() * NUM_W);
        for (let i = 0; i < NUM_W; i++) c[i] = i < cut ? a.w[i] : b.w[i];
        return c;
      }

      function mutate(w) {
        for (let i = 0; i < NUM_W; i++) {
          if (Math.random() < MUT_RATE) {
            w[i] += (Math.random() * 2 - 1) * MUT_SCALE;
          }
        }
        return w;
      }

      function evolve() {
        drones.sort((a, b) => b.fitness - a.fitness);
        const next = [];
        for (let i = 0; i < ELITE; i++) {
          next.push(new Drone(new Float32Array(drones[i].w)));
        }
        while (next.length < POP_SIZE) {
          const a = tournament();
          const b = tournament();
          let child = crossover(a, b);
          child = mutate(child);
          next.push(new Drone(child));
        }
        drones = next;
      }

      function randomTarget() {
        return {
          x: W * (0.4 + Math.random() * 0.3),
          y: H * (0.35 + Math.random() * 0.2),
          phase: Math.random() * Math.PI * 2
        };
      }

      let target = randomTarget();
      moveAnnotation();
      const FRAMES_PER_GEN = 360;
      let frame = 0;
      let gen = 0;

      function loop() {
        frame++;

        ctx.fillStyle = 'rgba(6, 8, 13, 0.14)';
        ctx.fillRect(0, 0, W, H);

        for (const d of drones) d.step(target);
        for (const d of drones) d.draw();

        const pulse = 0.55 + 0.45 * Math.sin(frame * 0.05 + target.phase);
        ctx.strokeStyle = `rgba(255, 107, 74, ${0.18 * pulse + 0.10})`;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(target.x, target.y, 30, 0, Math.PI * 2);
        ctx.stroke();
        ctx.fillStyle = `rgba(255, 107, 74, ${0.7 * pulse + 0.2})`;
        ctx.beginPath();
        ctx.arc(target.x, target.y, 3.2, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = 'rgba(255, 107, 74, 0.25)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(target.x - 16, target.y); ctx.lineTo(target.x - 7, target.y);
        ctx.moveTo(target.x + 7, target.y); ctx.lineTo(target.x + 16, target.y);
        ctx.moveTo(target.x, target.y - 16); ctx.lineTo(target.x, target.y - 7);
        ctx.moveTo(target.x, target.y + 7); ctx.lineTo(target.x, target.y + 16);
        ctx.stroke();

        if (frame >= FRAMES_PER_GEN) {
          let best = 0;
          for (const d of drones) if (d.fitness > best) best = d.fitness;
          gen++;
          genEl.textContent = String(gen).padStart(2, '0');
          bestEl.textContent = (best / FRAMES_PER_GEN).toFixed(2);
          evolve();
          for (const d of drones) d.reset();
          if (gen % 3 === 0) { target = randomTarget(); moveAnnotation(); }
          frame = 0;
          ctx.fillStyle = 'rgba(6, 8, 13, 0.55)';
          ctx.fillRect(0, 0, W, H);
        }

        requestAnimationFrame(loop);
      }
      loop();
    })();
  </script>
</body>
</html>
